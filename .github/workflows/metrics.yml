name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:              
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.34   
        timeout-minutes: 5 # Bring this down to 5 mins so you don't have to wait
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: surajbartoula
          template: classic
          base: header, repositories # Only fetching basic header and repo count
          config_timezone: Europe/Paris
          
          # Commenting these out temporarily to isolate the issue:
          # plugin_languages: yes
          # plugin_languages_ignored: html, css
          # plugin_languages_details: percentage
          # plugin_languages_sections: most-used
          # plugin_languages_limit: 8
