name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest # 1. Upgrade to the latest version
        timeout-minutes: 5
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: surajbartoula
          template: classic
          base: header, repositories
          config_timezone: Europe/Paris
          
          # 2. Limit the API burden by fetching fewer repositories at a time
          repositories_batch: 20 
          
          # Commented out plugins remain here...
