name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Runs daily at midnight
  workflow_dispatch:              # Allows you to run it manually
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.34   # Pinning to a stable release prevents hanging bugs
        timeout-minutes: 15              # Fails fast so it doesn't waste your runner time
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: surajbartoula
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Paris
          
          # Force the action to give up early if GitHub's API is choking
          config_twemojis: yes
          # config_order: base.header, base.activity+community, base.repositories

          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
